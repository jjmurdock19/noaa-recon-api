# Paste this `location` block inside the existing `server { listen 443 ... }`
# block for joshmurdock.net in /etc/nginx/nginx.conf (alongside the existing
# `root /var/www/html` and PHP-FPM blocks), so the hurricanes site can call
# the API same-origin at /api/... with no CORS needed. Run `nginx -t` before
# reloading.
location /api/ {
    proxy_pass http://127.0.0.1:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}
